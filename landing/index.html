<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GoalCrew | Ahorra en grupo</title>
    <style>
      :root {
        --bg: #0b0f1a;
        --surface: #141929;
        --surface-2: #1c2338;
        --accent: #6c63ff;
        --accent-2: #a78bfa;
        --text: #f0f2ff;
        --text-2: #8892b0;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
        background: radial-gradient(circle at top, #1a1555 0%, var(--bg) 55%);
        color: var(--text);
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .card {
        width: 100%;
        max-width: 640px;
        border: 1px solid #232c42;
        background: linear-gradient(160deg, var(--surface-2), var(--surface));
        border-radius: 18px;
        padding: 28px;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(28px, 5vw, 40px);
      }

      p {
        margin: 0 0 24px;
        color: var(--text-2);
        line-height: 1.5;
      }

      .actions {
        display: grid;
        gap: 12px;
      }

      .button {
        text-decoration: none;
        padding: 14px 16px;
        border-radius: 12px;
        font-weight: 700;
        text-align: center;
        transition: transform 0.12s ease;
      }

      .button:hover {
        transform: translateY(-1px);
      }

      .primary {
        color: #ffffff;
        background: linear-gradient(90deg, var(--accent), var(--accent-2));
      }

      .secondary {
        color: var(--text);
        border: 1px solid #2f3a5e;
        background: rgba(108, 99, 255, 0.1);
      }

      .note {
        margin-top: 14px;
        font-size: 13px;
        color: var(--text-2);
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>GoalCrew</h1>
      <p>Ahorra en grupo, viaja juntos. Usa la web app o descarga el APK para Android.</p>
      <section class="actions">
        <a class="button primary" href="https://goalcrew-web.vercel.app" target="_blank" rel="noreferrer">
          Abrir web app
        </a>
        <a class="button secondary" href="https://example.com/goalcrew.apk" target="_blank" rel="noreferrer">
          Descargar APK Android
        </a>
      </section>
      <p class="note">Actualiza ambos enlaces antes de publicar.</p>
    </main>
  </body>
</html>
